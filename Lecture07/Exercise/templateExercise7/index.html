<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Game</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">  
</head>
<body>
    <div class="container">
        <h1 class="text-center my-4">Memory Game</h1>
        <div class="row justify-content-center my-4">
            <div id="settings" class="d-flex align-items-center">
                <!-- Buttons and Input will go here -->
                <div>
                    Number of pairs:
                    <input type="number" id="numPairs" min="1" max="14" value="6">
                </div>
                <div>
                    <input id="player1" placeholder="Player 1" />
                    <input id="player2" placeholder="Player 2" />
                </div>
                <div>
                    <button id="startBtn" class="btn btn-primary">Start</button>
                </div>
                <div>
                    <button id="resetBtn" class="btn btn-secondary">Reset</button>
                </div>
                <div>
                    Game State:
                    <span id="gameState">NotStarted</span>
                </div>
            </div>
        </div>
        <div id="game-board" class="row justify-content-center"></div>
        <div id="score-board" class="row justify-content-center my-4"></div>
        <div id="endScreen"></div>
    </div>  
    <script type="module" src="dist/main.js"></script>
</body>
</html>
