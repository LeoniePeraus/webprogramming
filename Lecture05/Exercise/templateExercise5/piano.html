<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Piano</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="container text-center my-5">
        <h1>Virtual Piano</h1>
        <p>Press the following keys to play the notes:</p>
        <ul class="list-inline">
            <li class="list-inline-item key-spacing">
                <i class="bi bi-keyboard"></i> <strong>A</strong> - C
            </li>
            <li class="list-inline-item key-spacing">
                <i class="bi bi-keyboard"></i> <strong>S</strong> - D
            </li>
            <li class="list-inline-item key-spacing">
                <i class="bi bi-keyboard"></i> <strong>D</strong> - E
            </li>
            <li class="list-inline-item key-spacing">
                <i class="bi bi-keyboard"></i> <strong>F</strong> - F
            </li>
            <li class="list-inline-item key-spacing">
                <i class="bi bi-keyboard"></i> <strong>G</strong> - G
            </li>
            <li class="list-inline-item key-spacing">
                <i class="bi bi-keyboard"></i> <strong>H</strong> - A
            </li>
            <li class="list-inline-item key-spacing">
                <i class="bi bi-keyboard"></i> <strong>J</strong> - B
            </li>
        </ul>
        <div id="piano" class="d-flex justify-content-center">
            <!-- Piano keys with IDs for JavaScript interaction -->
            <button class="key" id="C">C</button>
            <button class="key" id="D">D</button>
            <button class="key" id="E">E</button>
            <button class="key" id="F">F</button>
            <button class="key" id="G">G</button>
            <button class="key" id="A">A</button>
            <button class="key" id="B">B</button>
        </div>
        <div id="note-line" class="mt-4">
            <div id="noteLine"></div>
        </div>
        <button type="button" class="btn btn-primary" id="theme1">Load Theme 1</button>
        <button type="button" class="btn btn-primary" id="theme2">Load Theme 2</button>
        <button type="button" class="btn btn-primary" id="theme3">Load Theme 3</button>
        <button type="button" class="btn btn-success" id="play">Play</button>
        <button type="button" class="btn btn-danger" id="reset">Reset</button>
        <!-- <button id="reset-notes" class="btn btn-danger mt-2">Reset Note Line</button> -->
    </div>
    <script src="dist/script.js"></script>
</body>
</html>
